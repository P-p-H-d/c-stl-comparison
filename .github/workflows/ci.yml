name: C/C++ CI

on:
   push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest    
    steps:
    - uses: actions/checkout@v4
      with:
          fetch-depth: 0
          token: ${{ secrets.BENCH_TOKEN }}
    - name: CPU Information
      run:  lscpu || echo "CPU information not available"
    - name: Compiler Information
      run:  cc -v
    - name: Install dependencies
      run:  sudo apt update && sudo apt install libboost-dev libglib2.0-dev
    - name: make
      run: make
    - name: make bench
      working-directory: ./bench
      run: make BOOST=/usr/include
    - name: Publish on branch result
      run: |
          git config user.email "16360675+P-p-H-d@users.noreply.github.com"
          git config user.name "Synchronization bot"
          cd bench && make report
          cp doc/BENCH.md .
          git reset --hard HEAD
          git switch result
          mv BENCH.md doc/BENCH.md
          python3 doc/update_bench_rank_history.py
          git add doc/BENCH.md
          git commit -m "Publish result by CI" 
          git push --force-with-lease origin result

